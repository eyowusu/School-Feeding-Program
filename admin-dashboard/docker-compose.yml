# ============================================================================
# GSFP Admin Dashboard - Docker Compose Configuration
# ============================================================================

version: '3.8'

services:
  admin-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gsfp-admin-dashboard
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=production
      - REACT_APP_FIREBASE_API_KEY=${REACT_APP_FIREBASE_API_KEY}
      - REACT_APP_FIREBASE_AUTH_DOMAIN=${REACT_APP_FIREBASE_AUTH_DOMAIN}
      - REACT_APP_FIREBASE_PROJECT_ID=${REACT_APP_FIREBASE_PROJECT_ID}
      - REACT_APP_FIREBASE_STORAGE_BUCKET=${REACT_APP_FIREBASE_STORAGE_BUCKET}
      - REACT_APP_FIREBASE_MESSAGING_SENDER_ID=${REACT_APP_FIREBASE_MESSAGING_SENDER_ID}
      - REACT_APP_FIREBASE_APP_ID=${REACT_APP_FIREBASE_APP_ID}
      - REACT_APP_GA_TRACKING_ID=${REACT_APP_GA_TRACKING_ID}
      - REACT_APP_ENABLE_REAL_TIME_SYNC=true
      - REACT_APP_ENABLE_PUSH_NOTIFICATIONS=true
      - REACT_APP_ENABLE_CONTENT_WORKFLOW=true
      - REACT_APP_ENABLE_ANALYTICS_DASHBOARD=true
      - REACT_APP_MAX_UPLOAD_SIZE=10485760
      - REACT_APP_CONTENT_CACHE_DURATION=300000
      - REACT_APP_ALLOWED_ORIGINS=https://gsfp.gov.gh,https://www.gsfp.gov.gh
      - REACT_APP_ADMIN_EMAIL_DOMAIN=gsfp.gov.gh
      - REACT_APP_DEBUG_MODE=false
      - REACT_APP_ENABLE_MOCK_DATA=false
    restart: unless-stopped
    networks:
      - gsfp-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  gsfp-network:
    driver: bridge
